name: Release

on:
  workflow_dispatch:
    inputs:
      patch_version:
        description: 'Patch version number (N in 1.0.N). Leave empty to auto-increment from the latest release.'
        required: false
        type: string

env:
  REGISTRY: docker.io
  IMAGE_NAME: radzap/tinyfileio

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve patch version
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ inputs.patch_version }}" ]; then
            PATCH="${{ inputs.patch_version }}"
          else
            LATEST=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName --jq '[.[].tagName | select(test("^v1\\.0\\.\\d+$")) | ltrimstr("v1.0.") | tonumber] | max // -1')
            PATCH=$((LATEST + 1))
          fi
          echo "version=1.0.${PATCH}" >> "$GITHUB_OUTPUT"

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: resolve-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [resolve-version, build-and-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (ARM emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: TinyFileIO/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-version, docker]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ needs.resolve-version.outputs.version }}
          git push origin v${{ needs.resolve-version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.resolve-version.outputs.version }}
          name: v${{ needs.resolve-version.outputs.version }}
          generate_release_notes: true
